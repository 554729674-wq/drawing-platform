<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>新建项目 - 渠道图纸审图平台</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f4f7f6; color: #1f2937; }
    a, button { font-family: inherit; }
    button { cursor: pointer; }
    .page-shell { max-width: 1000px; margin: 0 auto; padding: 0 20px 40px; }
    header { background: #2c3e50; color: #ffffff; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; border-radius: 0 0 18px 18px; box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08); }
    .brand-section { display: flex; align-items: center; gap: 14px; }
    .brand-title { margin: 0; font-size: 1.18rem; font-weight: 700; letter-spacing: 0.02em; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; color: #ffffff; text-decoration: none; cursor: pointer; transition: opacity 0.2s ease; }
    .back-link:hover { opacity: 0.8; }
    .header-actions { display: flex; align-items: center; gap: 18px; }
    .ghost-btn { border: 1px solid rgba(255,255,255,0.72); color: white; background: transparent; border-radius: 999px; padding: 10px 18px; transition: background 0.2s ease, opacity 0.2s ease; }
    .ghost-btn:hover { background: rgba(255,255,255,0.1); opacity: 0.94; }
    main { margin-top: 24px; }
    .page-title { margin: 0 0 8px 0; font-size: 1.5rem; font-weight: 700; color: #111827; }
    .page-subtitle { margin: 0 0 32px 0; color: #6b7280; font-size: 0.95rem; }
    .form-container { background: white; border-radius: 18px; box-shadow: 0 20px 45px rgba(15, 23, 42, 0.06); padding: 32px; }
    .form-section { margin-bottom: 32px; }
    .form-section:last-child { margin-bottom: 0; }
    .section-title { font-size: 1.1rem; font-weight: 700; color: #111827; margin: 0 0 18px 0; display: flex; align-items: center; gap: 8px; }
    .section-icon { font-size: 1.2rem; }
    .form-group { margin-bottom: 20px; }
    .form-group:last-child { margin-bottom: 0; }
    label { display: block; margin-bottom: 8px; color: #374151; font-weight: 600; font-size: 0.95rem; }
    .required { color: #ef4444; }
    input[type="text"], textarea, select { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 12px; background: #f8fafc; color: #111827; font-family: inherit; font-size: 0.95rem; transition: border-color 0.2s ease, background 0.2s ease; }
    input[type="text"]:focus, textarea:focus, select:focus { border-color: #3498db; background: #ffffff; outline: none; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1); }
    textarea { resize: vertical; min-height: 120px; }
    .hint-text { font-size: 0.88rem; color: #6b7280; margin-top: 6px; line-height: 1.5; }
    .tags-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .tag { display: inline-flex; align-items: center; gap: 8px; background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; border-radius: 999px; padding: 8px 14px; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
    .tag:hover { background: #dbeafe; border-color: #93c5fd; }
    .tag.selected { background: #3498db; border-color: #3498db; color: white; }
    .file-upload { position: relative; }
    .file-input-wrapper { position: relative; display: inline-block; width: 100%; }
    .file-input { position: absolute; opacity: 0; width: 0; height: 0; }
    .file-upload-area { border: 2px dashed #bfdbfe; border-radius: 12px; padding: 32px; text-align: center; background: #eff6ff; cursor: pointer; transition: all 0.2s ease; }
    .file-upload-area:hover { border-color: #3498db; background: #dbeafe; }
    .file-upload-area.active { border-color: #3498db; background: #dbeafe; }
    .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .upload-text { font-size: 0.95rem; color: #374151; margin-bottom: 4px; font-weight: 600; }
    .upload-hint { font-size: 0.85rem; color: #6b7280; }
    .file-list { margin-top: 16px; }
    .file-item { display: flex; align-items: center; justify-content: space-between; background: #f3f4f6; padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; }
    .file-info { display: flex; align-items: center; gap: 10px; }
    .file-icon { font-size: 1.2rem; }
    .file-details { text-align: left; }
    .file-name { font-weight: 600; color: #111827; font-size: 0.93rem; }
    .file-size { font-size: 0.83rem; color: #6b7280; }
    .remove-file { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 0.9rem; padding: 4px 8px; border-radius: 6px; transition: background 0.2s ease; }
    .remove-file:hover { background: rgba(239, 68, 68, 0.1); }
    .form-actions { display: flex; gap: 14px; margin-top: 32px; padding-top: 24px; border-top: 1px solid #e5e7eb; }
    .btn { padding: 13px 24px; border-radius: 12px; border: none; font-weight: 600; font-size: 0.95rem; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px; }
    .primary-btn { background: #3498db; color: white; box-shadow: 0 10px 25px rgba(52, 152, 219, 0.2); }
    .primary-btn:hover { background: #2c82c9; transform: translateY(-1px); }
    .primary-btn:active { transform: translateY(0); }
    .secondary-btn { background: transparent; color: #3498db; border: 1px solid #3498db; }
    .secondary-btn:hover { background: #eff6ff; }
    .divider { width: 100%; height: 1px; background: #e5e7eb; margin: 24px 0; }
    .error-message { color: #dc2626; font-size: 0.88rem; margin-top: 6px; }
    .success-message { color: #16a34a; font-size: 0.88rem; margin-top: 6px; }
    @media (max-width: 768px) {
      .page-shell { padding: 0 14px 30px; }
      .form-container { padding: 24px; }
      .form-actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .header-actions { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="brand-section">
        <a class="back-link" onclick="goBack()">
          <span>←</span>
          <div class="brand-title">📐 渠道图纸审图平台</div>
        </a>
      </div>
      <div class="header-actions">
        <button class="ghost-btn" id="signOutBtn">退出登录</button>
      </div>
    </header>

    <main>
      <h1 class="page-title">新建项目</h1>
      <p class="page-subtitle">请填写项目基本信息，上传项目图纸</p>

      <div class="form-container">
        <form id="createProjectForm">
          <!-- 基本信息 -->
          <div class="form-section">
            <h2 class="section-title"><span class="section-icon">📋</span>项目基本信息</h2>
            
            <div class="form-group">
              <label for="projectName">项目名称 <span class="required">*</span></label>
              <input 
                type="text" 
                id="projectName" 
                name="projectName" 
                placeholder="例如：ABC商场二期装修" 
                required
              >
              <p class="hint-text">请输入您的项目名称</p>
            </div>

            <div class="form-group">
              <label for="mainProduct">主要产品及特殊要求 <span class="required">*</span></label>
              <textarea 
                id="mainProduct" 
                name="mainProduct" 
                placeholder="例如：需要防火等级A级，优化排烟系统..."
                required
              ></textarea>
              <p class="hint-text">请描述项目的主要产品和任何特殊要求</p>
            </div>
          </div>

          <!-- 特殊要求标签 -->
          <div class="form-section">
            <h2 class="section-title"><span class="section-icon">🏷️</span>特殊要求示例</h2>
            <p class="hint-text" style="margin-bottom: 14px;">点击下方标签快速添加常见特殊要求到备注中</p>
            
            <div class="tags-container" id="tagsContainer">
              <div class="tag" onclick="addTag(this, '防火')">🔥 防火</div>
              <div class="tag" onclick="addTag(this, '排烟')">💨 排烟</div>
              <div class="tag" onclick="addTag(this, 'K值')">📏 K值</div>
              <div class="tag" onclick="addTag(this, '逃生')">🚪 逃生</div>
              <div class="tag" onclick="addTag(this, '隔音')">🔇 隔音</div>
              <div class="tag" onclick="addTag(this, '防水')">💧 防水</div>
              <div class="tag" onclick="addTag(this, '节能')">⚡ 节能</div>
              <div class="tag" onclick="addTag(this, '防盗')">🔐 防盗</div>
            </div>
          </div>

          <div class="divider"></div>

          <!-- 图纸上传 -->
          <div class="form-section">
            <h2 class="section-title"><span class="section-icon">📎</span>上传项目图纸</h2>
            
            <div class="file-upload">
              <div class="file-input-wrapper">
                <input 
                  type="file" 
                  id="blueprintFile" 
                  class="file-input" 
                  multiple
                  accept=".pdf,.dwg,.jpg,.jpeg,.png,.xlsx,.xls,.doc,.docx"
                  onchange="handleFileSelect(event)"
                >
                <div 
                  class="file-upload-area" 
                  id="uploadArea"
                  onclick="document.getElementById('blueprintFile').click()"
                  ondrop="handleDrop(event)"
                  ondragover="handleDragOver(event)"
                  ondragleave="handleDragLeave(event)"
                >
                  <div class="upload-icon">📁</div>
                  <div class="upload-text">拖拽或点击上传图纸</div>
                  <div class="upload-hint">支持 PDF、DWG、JPG、PNG、Excel、Word 等格式</div>
                </div>
              </div>
              <div class="file-list" id="fileList"></div>
            </div>
            <p class="hint-text">单个文件不超过 100MB，建议上传高清图纸</p>
          </div>

          <div class="divider"></div>

          <!-- 表单操作 -->
          <div class="form-actions">
            <button type="button" class="btn secondary-btn" onclick="goBack()">取消</button>
            <button type="submit" class="btn primary-btn">✓ 创建项目</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 1. 初始化 Supabase 数据库连接
    const SUPABASE_URL = 'https://mrowhymmhamvrxnvcqjv.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_idaDaiECgUZeYsCxDkolBg_6bKbkVe_';
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let selectedFiles = [];
    let currentUserCompany = '未知公司'; // 用来临时存储当前用户的公司名

    // 页面加载时，先查清楚是谁在建项目
    window.addEventListener('load', async () => {
      try {
        const { data: { user } } = await mySupabase.auth.getUser();
        if (!user) {
          alert("请先登录！");
          window.location.href = 'login.html';
          return;
        }
        // 拿到该用户的公司名称，等下建项目要用到
        currentUserCompany = user.user_metadata?.company_name || '未知公司';
      } catch (err) {
        console.error(err);
      }
    });

    // 返回上一页
    function goBack() { window.history.back(); }

    // 添加特殊要求标签
    function addTag(element, tagText) {
      const textarea = document.getElementById('mainProduct');
      const currentText = textarea.value.trim();
      if (currentText.includes(tagText)) {
        element.classList.remove('selected');
        const regex = new RegExp(tagText + '\\s*', 'g');
        textarea.value = currentText.replace(regex, '').trim();
      } else {
        element.classList.add('selected');
        textarea.value = currentText ? currentText + '、' + tagText : tagText;
      }
      textarea.focus();
    }

    // --- 文件拖拽与选择处理 (保持原样) ---
    function handleFileSelect(event) { addFilesToList(event.target.files); }
    function handleDragOver(event) { event.preventDefault(); document.getElementById('uploadArea').classList.add('active'); }
    function handleDragLeave(event) { event.preventDefault(); document.getElementById('uploadArea').classList.remove('active'); }
    function handleDrop(event) { event.preventDefault(); document.getElementById('uploadArea').classList.remove('active'); addFilesToList(event.dataTransfer.files); }
    
    function addFilesToList(files) {
      for (let file of files) {
        if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
          selectedFiles.push(file);
        }
      }
      renderFileList();
    }

    function renderFileList() {
      const fileList = document.getElementById('fileList');
      fileList.innerHTML = '';
      selectedFiles.forEach((file, index) => {
        const ext = file.name.split('.').pop().toLowerCase();
        const icons = {'pdf': '📄', 'dwg': '📐', 'jpg': '🖼️', 'png': '🖼️'};
        const icon = icons[ext] || '📎';
        const size = (file.size / 1024 / 1024).toFixed(2);
        
        fileList.innerHTML += `
          <div class="file-item">
            <div class="file-info">
              <div class="file-icon">${icon}</div>
              <div class="file-details">
                <div class="file-name">${file.name}</div>
                <div class="file-size">${size} MB</div>
              </div>
            </div>
            <button type="button" class="remove-file" onclick="removeFile(${index})">移除</button>
          </div>
        `;
      });
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderFileList();
    }

    // 🚀 核心升级：提交表单并真正写入数据库
    document.getElementById('createProjectForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const projectName = document.getElementById('projectName').value.trim();
      const mainProduct = document.getElementById('mainProduct').value.trim();
      
      if (!projectName || !mainProduct) return alert('请填写完整项目信息');
      
      // 暂时改变按钮状态，防止用户重复点击
      const submitBtn = document.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '正在创建中...';
      submitBtn.disabled = true;

      try {
        // 第一步：把项目信息写入 Supabase 的 projects 表！
        const { data: projectData, error: projectError } = await mySupabase
          .from('projects')
          .insert([
            { 
              project_name: projectName, 
              description: mainProduct,
              company_name: currentUserCompany // 绑定为当前公司专属项目！
            }
          ])
          .select(); // 写入后立即返回这条新数据的信息

        if (projectError) throw projectError;
        
        const newProjectId = projectData[0].id; // 拿到新生成的项目 ID

        // 第二步：如果有附件，把图纸信息写入 drawings 表（关联到刚才的项目 ID）
        if (selectedFiles.length > 0) {
          const drawingRecords = selectedFiles.map(file => ({
            project_id: newProjectId,
            file_name: file.name,
            status: '待提交'
          }));

          const { error: drawingError } = await mySupabase
            .from('drawings')
            .insert(drawingRecords);

          if (drawingError) throw drawingError;
        }

        alert('✓ 项目创建成功并已存入云端！');
        window.location.href = 'index.html';

      } catch (err) {
        alert('创建失败: ' + err.message);
        console.error(err);
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    document.getElementById('signOutBtn').addEventListener('click', async () => {
      await mySupabase.auth.signOut();
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
