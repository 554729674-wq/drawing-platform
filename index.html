<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>威卢克斯项目审图平台</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; background: #f4f5f7; color: #111827; }
    header { background: white; color: #111827; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand img { height: 34px; width: auto; }
    .brand-title { margin: 0; font-size: 1.15rem; font-weight: 700; letter-spacing: 0.01em; }
    .brand-subtitle { margin: 4px 0 0; font-size: 0.92rem; color: #6b7280; }
    .main { display: flex; flex: 1; padding: 22px; gap: 18px; min-height: calc(100vh - 78px); }
    .left, .right { background: white; border-radius: 18px; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08); border: 1px solid rgba(226, 232, 240, 0.8); }
    .left { flex: 7; }
    .right { flex: 3; }
    .comment-list { flex: 1; overflow-y: auto; background: #f8fafc; padding: 14px; border-radius: 16px; margin-bottom: 14px; border: 1px solid #e5e7eb; }
    .comment-item { background: white; padding: 14px; border: 1px solid #e5e7eb; margin-bottom: 12px; border-radius: 14px; font-size: 0.96rem; line-height: 1.65; color: #1f2937; }
    textarea { width: 100%; box-sizing: border-box; resize: none; padding: 14px; margin-bottom: 12px; border: 1px solid #d1d5db; border-radius: 14px; outline: none; background: #f8fafc; font-size: 0.95rem; color: #111827; }
    textarea:focus { border-color: #c8102e; background: #ffffff; }
    .btn { padding: 10px 18px; background: #c8102e; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: background 0.2s ease; }
    .btn:hover { background: #9f0d28; }
    .canvas { flex: 1; background: #eef2f5; display: flex; align-items: center; justify-content: center; border: 2px dashed #d1d5db; margin-top: 16px; color: #6b7280; border-radius: 18px; }
    .section-title { margin: 0 0 16px; color: #111827; font-size: 1rem; font-weight: 700; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <div class="brand">
      <img src="velux-logo.png" alt="VELUX Logo">
      <div>
        <h2 class="brand-title">威卢克斯项目审图平台</h2>
        <div class="brand-subtitle">施工图审图与协同管理</div>
      </div>
    </div>
    <button class="btn" onclick="location.href='login.html'">退出登录</button>
  </header>

  <div class="main">
    <div class="left">
      <div>
        <button class="btn" onclick="alert('存储功能下一步对接 Cloudflare R2 网盘')">☁️ 上传最新修改图纸</button>
      </div>
      <div class="canvas">图纸预览区域加载中... (大图纸将在后续配置高速存储)</div>
    </div>
    
    <div class="right">
      <h3 style="margin-top:0; color: #2c3e50;">💬 图纸审查意见</h3>
      <div class="comment-list" id="box-list">正在连接云端数据库...</div>
      <textarea id="msg" rows="4" placeholder="输入意见。例如：请核实单窗最大排烟面积；或者 CAD 插件中模块大于 2 平米请优先水平分割..."></textarea>
      <button class="btn" onclick="sendMsg()" style="width: 100%;">发送意见</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://mrowhymmhamvrxnvcqjv.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_idaDaiECgUZeYsCxDkolBg_6bKbkVe_';
    
    // 【修复点】改成了 mySupabase
    const mySupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadComments() {
      const { data, error } = await mySupabase.from('audit_comments').select('*').order('created_at', { ascending: true });
      const listDiv = document.getElementById('box-list');
      
      if (error) {
        listDiv.innerText = "数据读取失败: " + error.message;
        return;
      }
      
      listDiv.innerHTML = '';
      if(data.length === 0) {
        listDiv.innerHTML = '<div style="color:#999; text-align:center; margin-top: 20px;">暂无审图意见</div>';
      } else {
        data.forEach(item => {
          listDiv.innerHTML += `<div class="comment-item">📌 ${item.content}</div>`;
        });
      }
      listDiv.scrollTop = listDiv.scrollHeight;
    }

    async function sendMsg() {
      const txt = document.getElementById('msg').value.trim();
      if(!txt) return alert("修改意见不能为空");

      const { error } = await mySupabase.from('audit_comments').insert([{ content: txt }]);
      if (error) {
        alert("发送失败: " + error.message);
      } else {
        document.getElementById('msg').value = '';
        loadComments(); 
      }
    }

    loadComments(); 
  </script>
</body>
</html>
